<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Menu Key Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🔑 MENU KEY PANEL</h1>

  <input type="text" id="search" placeholder="Cari key / nama..." onkeyup="cariKey()">

  <div id="listKey"></div>

  <div class="footer">
    <p>LINK APK PANEL:</p>
    <a href="https://sociabuzz.com/dezzreal" target="_blank">
      https://sociabuzz.com/dezzreal
    </a>
  </div>
</div>

<script src="script.js"></script>

<!-- REGISTER SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('firebase-messaging-sw.js')
  .then(function(reg){
    console.log("SW aktif:", reg);
  }).catch(function(err){
    console.log("SW gagal:", err);
  });
}
</script>

<!-- FIREBASE -->
<script type="module">
  import { initNotif } from "./firebase.js";
  initNotif();
</script>

</body>
</html>
